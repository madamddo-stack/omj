<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오먹지</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Pretendard -->
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

</head>

<body class="bg-[#f5f5f5] font-[Pretendard]">

<div class="max-w-md mx-auto py-6 px-4">

  <!-- 상단 -->
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-xl font-bold text-orange-600">📍 오먹지</h1>
    <span>🔔</span>
  </div>

  <!-- 히어로 카드 -->
  <div class="bg-[#f6c36b] rounded-3xl p-6 mb-6">
    <p class="text-sm mb-2">☀️ Sunny & Hot</p>
    <h2 class="text-2xl font-bold leading-snug mb-4">
      무더운 오늘,<br/>
      시원한 면 어떠세요?
    </h2>

    <div class="flex gap-2">
      <button class="bg-black text-white px-4 py-2 rounded-full text-sm">
        Weather Special
      </button>
      <button class="bg-white px-4 py-2 rounded-full text-sm">
        실시간 인기
      </button>
    </div>
  </div>

  <!-- 필터 -->
  <div class="flex gap-2 mb-6 overflow-x-auto">
    <button class="bg-orange-500 text-white px-4 py-1 rounded-full text-sm">전체</button>
    <button class="bg-gray-200 px-4 py-1 rounded-full text-sm">국물</button>
    <button class="bg-gray-200 px-4 py-1 rounded-full text-sm">면</button>
    <button class="bg-gray-200 px-4 py-1 rounded-full text-sm">밥</button>
    <button class="bg-gray-200 px-4 py-1 rounded-full text-sm">고기</button>
    <button class="bg-gray-200 px-4 py-1 rounded-full text-sm">가볍게</button>
  </div>

  <!-- 리스트 -->
  <div id="resultGrid" class="flex flex-col gap-6"></div>

</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQerqNYDqu3deQYHvRYPlWEyVVibWgA_wKmlRL9gIYgHKL1C4Ok63ElWjQ7QkqL4OObK6iIGxdyWT1K/pub?gid=2085358171&single=true&output=csv";

async function loadData(){
  const res = await fetch(CSV_URL)
  const text = await res.text()
  const rows = text.split("\n").slice(1)

  return rows.map(row => {
    const cols = row.split(",")
    return {
      name: cols[0],
      menu: cols[1],
      distance: cols[2],
      price: cols[3],
      url: cols[4]
    }
  })
}

function renderCard(item){
  return `
  <div class="bg-white rounded-2xl overflow-hidden shadow">

    <div class="h-40 bg-gray-200"></div>

    <div class="p-4">

      <h3 class="font-bold text-lg mb-1">${item.name}</h3>

      <p class="text-sm text-gray-500 mb-2">
        ${item.price} · ${item.distance}
      </p>

      <div class="flex justify-between items-center">

        <span class="text-xs text-gray-400">
          ${item.menu}
        </span>

        <a href="${item.url}" target="_blank"
           class="bg-orange-500 text-white w-8 h-8 flex items-center justify-center rounded-full">
           →
        </a>

      </div>
    </div>

  </div>
  `
}

async function init(){
  const data = await loadData()
  const grid = document.getElementById("resultGrid")

  grid.innerHTML = data.map(renderCard).join("")
}

init()

</script>

</body>
</html>
