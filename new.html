<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오먹지</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background: #f6f5f1;
    }
  </style>
</head>
<body class="text-[#1f1f1f]">

  <div class="max-w-sm mx-auto min-h-screen px-5 pt-6 pb-24">

    <!-- 상단 헤더 -->
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-2">
        <span class="text-orange-700 text-xl">📍</span>
        <div>
          <h1 class="text-2xl font-bold text-orange-700">오먹지</h1>
          <p class="text-xs text-gray-500">교대·서초 직장인 점심 추천</p>
        </div>
      </div>
      <button class="text-xl text-orange-700">🔔</button>
    </div>

    <!-- 히어로 카드 -->
    <div class="bg-[#f6c36b] rounded-[32px] p-6 mb-6 relative overflow-hidden shadow-sm">
      <div class="text-sm font-medium text-[#5c3a00] mb-2">☀️ Sunny & Hot</div>
      <h2 class="text-[22px] leading-[1.35] font-bold text-[#4b2d00] mb-5">
        무더운 오늘,<br />
        시원한 면 메뉴로<br />
        가볍게 가볼까요?
      </h2>

      <div class="flex gap-2">
        <button class="bg-[#4b2d00] text-white px-4 py-2 rounded-full text-sm font-medium">
          날씨 추천
        </button>
        <button class="bg-[#f8e3b8] text-[#5c3a00] px-4 py-2 rounded-full text-sm font-medium">
          11:30 안전
        </button>
      </div>

      <div class="absolute right-5 top-8 text-[72px] opacity-20">☁️</div>
    </div>

    <!-- 필터 -->
    <div class="flex gap-2 overflow-x-auto no-scrollbar mb-6">
      <button class="shrink-0 bg-orange-500 text-white px-4 py-2 rounded-full text-sm font-medium">전체</button>
      <button class="shrink-0 bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm">국물</button>
      <button class="shrink-0 bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm">면</button>
      <button class="shrink-0 bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm">밥</button>
      <button class="shrink-0 bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm">고기</button>
      <button class="shrink-0 bg-gray-200 text-gray-700 px-4 py-2 rounded-full text-sm">가볍게</button>
    </div>

    <!-- 추천 카드 1 -->
    <div class="mb-7">
      <div class="relative rounded-[28px] overflow-hidden bg-white shadow-sm">
        <img
          src="https://images.unsplash.com/photo-1617093727343-374698b1b08d?auto=format&fit=crop&w=1000&q=80"
          alt="냉면"
          class="w-full h-[220px] object-cover"
        />
        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-sm font-semibold text-orange-700 shadow">
          7분컷
        </div>
      </div>

      <div class="flex items-end justify-between mt-4">
        <div>
          <h3 class="text-[20px] font-bold leading-tight">한가람 평양냉면</h3>
          <p class="text-sm text-gray-500 mt-1">₩12,000 · 도보 6분 · 11:30 안전</p>
          <p class="text-sm text-gray-700 mt-2">무더운 날 가장 먼저 떠오르는 정석 냉면</p>
        </div>
        <button class="w-12 h-12 rounded-full bg-orange-500 text-white text-xl shadow-md">→</button>
      </div>
    </div>

    <!-- 추천 카드 2 -->
    <div class="mb-7">
      <div class="relative rounded-[28px] overflow-hidden bg-white shadow-sm">
        <img
          src="https://images.unsplash.com/photo-1555126634-323283e090fa?auto=format&fit=crop&w=1000&q=80"
          alt="소바"
          class="w-full h-[220px] object-cover"
        />
        <div class="absolute left-4 bottom-4 bg-lime-200 text-lime-800 px-3 py-1 rounded-full text-sm font-semibold shadow">
          혼밥 추천
        </div>
      </div>

      <div class="flex items-end justify-between mt-4">
        <div>
          <h3 class="text-[20px] font-bold leading-tight">미도리 소바 전문점</h3>
          <p class="text-sm text-gray-500 mt-1">₩14,000 · 도보 7분 · 혼밥 가능</p>
          <p class="text-sm text-gray-700 mt-2">습한 날 가볍고 시원하게 먹기 좋은 소바</p>
        </div>
        <button class="w-12 h-12 rounded-full bg-orange-500 text-white text-xl shadow-md">→</button>
      </div>
    </div>

    <!-- 추천 카드 3 -->
    <div class="mb-7">
      <div class="relative rounded-[28px] overflow-hidden bg-white shadow-sm bg-[#f7f4ef]">
        <div class="w-full h-[220px] flex items-center justify-center text-[110px]">
          🐻
        </div>
        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-sm font-semibold text-orange-700 shadow">
          가성비
        </div>
      </div>

      <div class="flex items-end justify-between mt-4">
        <div>
          <h3 class="text-[20px] font-bold leading-tight">서민콩국수</h3>
          <p class="text-sm text-gray-500 mt-1">₩10,000 · 도보 5분 · 여름 강추</p>
          <p class="text-sm text-gray-700 mt-2">고소하고 든든한 한 끼, 더울수록 생각나는 메뉴</p>
        </div>
        <button class="w-12 h-12 rounded-full bg-orange-500 text-white text-xl shadow-md">→</button>
      </div>
    </div>

  </div>

  <!-- 하단 탭바 -->
  <div class="fixed bottom-0 left-0 right-0 max-w-sm mx-auto bg-[#f6f5f1] border-t border-gray-200 px-6 py-3 flex justify-between items-center">
    <button class="flex flex-col items-center text-gray-700 text-xs">
      <span class="text-lg">🏠</span>
      홈
    </button>
    <button class="flex flex-col items-center text-gray-700 text-xs">
      <span class="text-lg">🔍</span>
      검색
    </button>
    <button class="flex flex-col items-center text-orange-700 text-xs font-semibold">
      <span class="w-12 h-12 rounded-full bg-[#f6c36b] flex items-center justify-center text-lg -mt-8 shadow">🍚</span>
      추천
    </button>
    <button class="flex flex-col items-center text-gray-700 text-xs">
      <span class="text-lg">📍</span>
      지도
    </button>
  </div>

</body>
</html>
