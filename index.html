<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>오먹지 MVP</title>

<style>
:root{
  --bg:#FFF8F2;
  --card:#F4F1EC;
  --text:#2F2F2F;
  --sub:#6B6B6B;
  --primary:#E4572E;
  --safe:#4CAF50;
  --mid:#F4B400;
  --busy:#D84343;
  --radius:16px;
  font-family: Pretendard, -apple-system, BlinkMacSystemFont;
}

body{ margin:0; background:var(--bg); color:var(--text); }
.wrap{ max-width:920px; margin:0 auto; padding:20px; }

h1{ font-size:22px; margin:0 0 6px; }
.sub{ color:var(--sub); font-size:13px; margin-bottom:14px; }

.panel{
  background:var(--card);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:14px;
}

.filter-row{
  display:flex;
  gap:8px;
  overflow-x:auto;
}

select{
  padding:10px 12px;
  border-radius:12px;
  border:1px solid rgba(0,0,0,.08);
  background:white;
  font-size:14px;
  min-width:110px;
}

.grid{
  display:grid;
  gap:12px;
}

.card{
  background:#fff;
  border-radius:var(--radius);
  padding:14px;
  border:1px solid rgba(0,0,0,.06);
}

.topline{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.name{ font-size:18px; font-weight:600; }

.meta{
  margin-top:8px;
  font-size:13px;
  color:var(--sub);
}

.label{
  font-size:12px;
  color:var(--sub);
  margin-top:10px;
}

.value{
  font-size:14px;
  margin-top:2px;
}

.bottom-row{
  margin-top:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.tag{
  background:var(--card);
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

.btn{
  background:var(--primary);
  color:white;
  padding:8px 14px;
  border-radius:999px;
  text-decoration:none;
  font-size:13px;
}
</style>

</head>

<body>

<div class="wrap">
  <h1>🍚 오먹지</h1>
  <div class="sub">교대역 7번 출구 · 점심 추천</div>

  <div class="panel">
    <div class="filter-row">

      <select id="cat">
        <option value="">전체</option>
        <option value="국물">국물</option>
        <option value="면">면</option>
        <option value="밥">밥</option>
        <option value="고기">고기</option>
        <option value="가볍게">가볍게</option>
      </select>

      <select id="budget">
        <option value="">예산</option>
        <option value="10000">1만원↓</option>
        <option value="13000">1.3만원↓</option>
        <option value="15000">1.5만원↓</option>
      </select>

      <select id="dist">
        <option value="7">7분컷</option>
        <option value="">전체</option>
      </select>

      <select id="solo">
        <option value="">혼밥</option>
        <option value="가능">가능</option>
        <option value="불가능">불가능</option>
      </select>

    </div>
  </div>

  <div id="results" class="grid"></div>
</div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQerqNYDqu3deQYHvRYPlWEyVVibWgA_wKmlRL9gIYgHKL1C4Ok63ElWjQ7QkqL4OObK6iIGxdyWT1K/pub?gid=2085358171&single=true&output=csv";

const elCat = document.getElementById("cat");
const elBudget = document.getElementById("budget");
const elDist = document.getElementById("dist");
const elSolo = document.getElementById("solo");
const elResults = document.getElementById("results");

let db = [];

function parseCSV(text){
  const rows = text.trim().split("\n");
  const headers = rows[0].split(",");
  return rows.slice(1).map(r => {
    const cols = r.split(",");
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = cols[i]);
    return obj;
  });
}

function getSoloLabel(v){
  return (v === "매우좋음" || v === "가능") ? "가능" : "불가능";
}

function getSafetyLabel(v){
  if(v === "안전") return "11:30 여유";
  if(v === "보통") return "11:30 보통";
  if(v === "붐빔") return "11:30 혼잡";
  return "확인 필요";
}

function filterDB(){
  return db.filter(item => {

    if(elCat.value && item["카테고리"] !== elCat.value) return false;

    if(elSolo.value){
      if(elSolo.value === "가능"){
        if(!(item["혼밥"] === "가능" || item["혼밥"] === "매우좋음")) return false;
      } else {
        if(!(item["혼밥"] === "애매" || item["혼밥"] === "비추천")) return false;
      }
    }

    if(elBudget.value && Number(item["가격대"]) > Number(elBudget.value)) return false;

    if(elDist.value && Number(item["도보거리"]) > Number(elDist.value)) return false;

    return true;
  });
}

function render(list){
  if(list.length === 0){
    elResults.innerHTML = "조건에 맞는 식당이 없어요 😢";
    return;
  }

  elResults.innerHTML = list.map(item => `
    <div class="card">

      <div class="topline">
        <div class="name">${item["상호명"]}</div>
        <div>${getSafetyLabel(item["안전도"])}</div>
      </div>

      <div class="meta">
        🚶 ${item["도보거리"]}분 · 💸 ${Number(item["가격대"]).toLocaleString()}원 · 🧍 ${getSoloLabel(item["혼밥"])}
      </div>

      <div class="label">추천메뉴</div>
      <div class="value">${item["추천메뉴"]}</div>

      <div class="bottom-row">
        <div class="tag">매장특징 · ${item["결정포인트"]}</div>

        <a href="${item["네이버지도URL"]}" target="_blank" class="btn">
          길찾기
        </a>
      </div>

    </div>
  `).join("");
}

function pick(){
  render(filterDB());
}

elCat.addEventListener("change", pick);
elBudget.addEventListener("change", pick);
elDist.addEventListener("change", pick);
elSolo.addEventListener("change", pick);

async function init(){
  const res = await fetch(CSV_URL);
  const text = await res.text();
  db = parseCSV(text);
  pick();
}

init();

</script>

</body>
</html>
