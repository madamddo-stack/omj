<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오먹지</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  margin:0;
  padding:20px;
  background:#f5f5f5;
}

h1 {
  font-size:22px;
  margin-bottom:16px;
}

.row{
  display:flex;
}

.filter-bar{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:16px;
}

select{
  padding:10px 12px;
  border-radius:999px;
  border:1px solid rgba(0,0,0,.1);
  background:white;
  font-size:14px;
  min-width:110px;
  flex:0 0 auto;
}

.card{
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
}

.title{
  font-weight:bold;
  margin-bottom:6px;
}

.meta{
  font-size:12px;
  color:#666;
  margin-bottom:6px;
}

.menu{
  font-size:13px;
  margin-bottom:10px;
}

.btn{
  display:inline-block;
  padding:6px 10px;
  background:black;
  color:white;
  border-radius:6px;
  font-size:12px;
  text-decoration:none;
}
</style>

</head>
<body>

<h1>🍚 오먹지</h1>

<!-- 필터 -->
<div class="filter-bar">

  <select id="cat">
    <option value="">전체</option>
    <option value="국물">국물</option>
    <option value="면">면</option>
    <option value="밥">밥</option>
    <option value="고기">고기</option>
    <option value="가볍게">가볍게</option>
  </select>

  <select id="budget">
    <option value="">예산</option>
    <option value="10000">1만원↓</option>
    <option value="13000">1.3만원↓</option>
    <option value="15000">1.5만원↓</option>
  </select>

  <select id="dist">
    <option value="7">7분컷</option>
    <option value="">전체</option>
  </select>

  <select id="solo">
    <option value="">혼밥</option>
    <option value="매우좋음">매우좋음</option>
    <option value="가능">가능</option>
  </select>

</div>

<!-- 결과 -->
<div id="list"></div>

<script>

const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQerqNYDqu3deQYHvRYPlWEyVVibWgA_wKmlRL9gIYgHKL1C4Ok63ElWjQ7QkqL4OObK6iIGxdyWT1K/pub?gid=2085358171&single=true&output=csv";

const elCat = document.getElementById("cat");
const elBudget = document.getElementById("budget");
const elDist = document.getElementById("dist");
const elSolo = document.getElementById("solo");

let DB = [];

async function loadData(){
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const rows = text.split("\n");
  const headers = rows[0].split(",");

  DB = rows.slice(1).map(row => {
    const cols = row.split(",");
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = cols[i]);
    return obj;
  });

  pick();
}

function filterDB(){
  return DB.filter(item => {

    if(elCat.value && item["카테고리"] !== elCat.value) return false;

    if(elSolo.value && item["혼밥"] !== elSolo.value) return false;

    if(elBudget.value && Number(item["가격"]) > Number(elBudget.value)) return false;

    if(elDist.value && Number(item["도보거리"]) > Number(elDist.value)) return false;

    return true;
  });
}

function render(list){
  const container = document.getElementById("list");

  if(list.length === 0){
    container.innerHTML = "조건에 맞는 식당이 없어요 😢";
    return;
  }

  container.innerHTML = list.map(item => `
    <div class="card">
      <div class="title">${item["상호명"]}</div>
      <div class="meta">
        ${item["가격"]}원 · 도보 ${item["도보거리"]}분
      </div>
      <div class="menu">${item["추천메뉴"]}</div>
      <a href="${item["네이버지도URL"]}" target="_blank" class="btn">네이버 지도</a>
    </div>
  `).join("");
}

function pick(){
  const filtered = filterDB();
  render(filtered);
}

elCat.addEventListener("change", pick);
elBudget.addEventListener("change", pick);
elDist.addEventListener("change", pick);
elSolo.addEventListener("change", pick);

loadData();

</script>

</body>
</html>
